<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICL444 Car Edits</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
position:fixed;
width:100%;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:700;
color:#ff2e63;
}

nav a{
margin-left:30px;
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#ff2e63;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
background:linear-gradient(black,rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:60px;
color:#ff2e63;
}

.hero p{
margin-top:10px;
font-size:20px;
}

.btn{
margin-top:20px;
padding:12px 30px;
background:#ff2e63;
border:none;
color:white;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

section{
padding:100px 60px;
}

.section-title{
text-align:center;
font-size:40px;
margin-bottom:50px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
transform-style:preserve-3d;
transition:transform 0.4s;
}

.card:hover{
transform:rotateY(10deg) rotateX(10deg) scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:15px;
text-align:center;
}

.video-section{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
}

.video-section video{
width:400px;
border-radius:15px;
box-shadow:0 0 20px #ff2e63;
}

.footer{
background:#111;
text-align:center;
padding:40px;
}

.insta{
color:#ff2e63;
font-weight:700;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<div class="logo">ICL444</div>

<nav>
<a href="#">Home</a>
<a href="#cars">Cars</a>
<a href="#videos">Videos</a>
<a href="#contact">Contact</a>
</nav>

</header>

<section class="hero">

<h1>ICL444 Car Edits</h1>
<p>Professional Car Editor</p>
<p>Owner: Ash Mers</p>

<a href="https://instagram.com/icl444_" target="_blank">
<button class="btn">Visit Instagram</button>
</a>

</section>

<section id="cars">

<h2 class="section-title">Car Edits Gallery</h2>

<div class="gallery">

<div class="card">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7">
<h3>Sports Car Edit</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
<h3>Luxury Car Edit</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<h3>Night Car Edit</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542362567-b07e54358753">
<h3>Supercar Edit</h3>
</div>

</div>

</section>

<section id="videos">

<h2 class="section-title">Car Edit Videos</h2>

<div class="video-section">

<video controls>
<source src="carvideo.mp4" type="video/mp4">
</video>

<video controls>
<source src="editvideo.mp4" type="video/mp4">
</video>

</div>

</section>

<section id="contact">

<h2 class="section-title">Contact</h2>

<div style="text-align:center">

<p>Instagram Editor</p>

<a class="insta" href="https://instagram.com/icl444_" target="_blank">
@icl444_
</a>

<p style="margin-top:10px;">Owner: Ash Mers</p>

</div>

</section>

<div class="footer">

<p>© 2026 ICL444 Car Edits | Owner Ash Mers</p>

</div>

</body>
</html>
